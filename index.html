<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ STEP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 背景スライドショー（2層クロスフェード） -->
  <div id="bg-a" class="bg-layer"></div>
  <div id="bg-b" class="bg-layer"></div>

  <header>
    <h1 id="site-title">C++ STEP</h1>
    <p id="progress-text">0 / 30 問 クリア</p>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </header>

  <!-- タブナビゲーション -->
  <div id="nav-tabs">
    <button class="nav-tab active" id="tab-problems" onclick="switchTab('problems')">◆ PROBLEMS</button>
    <button class="nav-tab" id="tab-missions" onclick="switchTab('missions')">◆ MISSIONS</button>
    <button class="nav-tab" id="tab-guide" onclick="switchTab('guide')">◆ GUIDE</button>
  </div>

  <!-- 問題一覧ページ -->
  <div id="page-list">
    <div id="problem-list"></div>
  </div>

  <!-- 問題詳細ページ -->
  <div id="page-detail" class="hidden">
    <button id="back-btn">← 一覧に戻る</button>
    <div id="detail-content"></div>
  </div>

  <!-- ガイドページ -->
  <div id="page-guide" class="hidden">
    <div id="guide-content"></div>
  </div>

  <!-- ミッション一覧ページ -->
  <div id="page-mission-list" class="hidden">
    <div id="mission-list"></div>
  </div>

  <!-- ミッション詳細ページ -->
  <div id="page-mission-detail" class="hidden">
    <button id="mission-back-btn">← ミッション一覧に戻る</button>
    <div id="mission-detail-content"></div>
  </div>

  <!-- AI チャットパネル -->
  <div id="chat-panel" class="hidden">
    <div id="chat-header">
      <span>// AI に質問する</span>
      <button id="chat-close">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-footer">
      <textarea id="chat-input" placeholder="C++について何でも質問してください..."></textarea>
      <button id="chat-send">送信</button>
    </div>
  </div>
  <button id="chat-toggle">AI</button>

  <script src="script.js"></script>
</body>
</html>
