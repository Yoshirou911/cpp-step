<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODE STEP</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CODE STEP">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 背景スライドショー（2層クロスフェード） -->
  <div id="bg-a" class="bg-layer"></div>
  <div id="bg-b" class="bg-layer"></div>

  <header>
    <div class="header-top-row">
      <div class="header-title-row">
        <h1 id="site-title">CODE STEP</h1>
        <div id="lang-badge" class="hidden"></div>
      </div>
      <div id="auth-area">
        <button id="sound-btn" onclick="toggleSound()" title="サウンドON/OFF">🔊</button>
        <button id="auth-btn" onclick="openAuthModal()">◆ LOGIN</button>
        <div id="user-info" class="hidden">
          <span id="user-email-display"></span>
          <button id="logout-btn" onclick="authSignOut()">LOGOUT</button>
        </div>
      </div>
    </div>
    <p id="progress-text" class="hidden">0 / 30 問 クリア</p>
    <div id="progress-bar-wrap" class="hidden">
      <div id="progress-bar"></div>
    </div>
  </header>

  <!-- タブナビゲーション -->
  <div id="nav-tabs" class="hidden">
    <button class="nav-tab active" id="tab-problems" onclick="switchTab('problems')">◆ PROBLEMS</button>
    <button class="nav-tab" id="tab-missions" onclick="switchTab('missions')">◆ MISSIONS</button>
    <button class="nav-tab" id="tab-guide" onclick="switchTab('guide')">◆ GUIDE</button>
  </div>

  <!-- 言語選択ページ -->
  <div id="page-lang">
    <div id="lang-content"></div>
  </div>

  <!-- 問題一覧ページ -->
  <div id="page-list" class="hidden">
    <div id="problem-list"></div>
  </div>

  <!-- 問題詳細ページ -->
  <div id="page-detail" class="hidden">
    <button id="back-btn">← 一覧に戻る</button>
    <div id="detail-content"></div>
  </div>

  <!-- ガイドページ -->
  <div id="page-guide" class="hidden">
    <div id="guide-content"></div>
  </div>

  <!-- ミッション一覧ページ -->
  <div id="page-mission-list" class="hidden">
    <div id="mission-list"></div>
  </div>

  <!-- ミッション詳細ページ -->
  <div id="page-mission-detail" class="hidden">
    <button id="mission-back-btn">← ミッション一覧に戻る</button>
    <div id="mission-detail-content"></div>
  </div>

  <!-- AI チャットパネル -->
  <div id="chat-panel" class="hidden">
    <div id="chat-header">
      <span>// AI に質問する</span>
      <button id="chat-close">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-footer">
      <textarea id="chat-input" placeholder="プログラミングについて何でも質問してください..."></textarea>
      <button id="chat-send">送信</button>
    </div>
  </div>
  <button id="chat-toggle">AI</button>

  <!-- クリアエフェクトオーバーレイ -->
  <div id="clear-effect" class="hidden">
    <div class="clear-effect-text">◆ CLEARED ◆</div>
  </div>
  <div id="mission-clear-effect" class="hidden">
    <div class="clear-effect-text mission">◆ MISSION COMPLETE ◆</div>
  </div>

  <!-- 認証モーダル -->
  <div id="auth-modal" class="hidden">
    <div id="auth-modal-overlay" onclick="closeAuthModal()"></div>
    <div id="auth-modal-box">
      <div id="auth-modal-header">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">LOGIN</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">SIGN UP</button>
        <button id="auth-modal-close" onclick="closeAuthModal()">✕</button>
      </div>
      <div id="auth-modal-body">
        <div id="auth-error" class="hidden"></div>
        <div id="auth-success" class="hidden"></div>
        <input type="email" id="auth-email" placeholder="メールアドレス" autocomplete="email">
        <input type="password" id="auth-password" placeholder="パスワード（6文字以上）" autocomplete="current-password">
        <button id="auth-submit-btn" onclick="submitAuth()">LOGIN</button>
      </div>
    </div>
  </div>

  <!-- Ace Editor (VS Code と同じエンジン) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.5/ace.min.js"></script>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- コンフェッティ -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
